<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debate de Normas - Génesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Ubuntu:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --coc-green: #4e9421;
            --coc-dark-green: #3a7217;
            --paper: #e6cc9e;
            --wood: #5d3a1a;
        }
        body {
            font-family: 'Ubuntu', sans-serif;
            background: radial-gradient(circle, var(--coc-green) 0%, var(--coc-dark-green) 100%);
            min-height: 100vh;
            color: #3a2410;
        }
        .coc-font { font-family: 'Luckiest Guy', cursive; text-shadow: 2px 2px 0px #000; }
        .comment-bubble {
            background: var(--paper);
            border: 3px solid var(--wood);
            border-radius: 15px;
            position: relative;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .comment-bubble::after {
            content: '';
            position: absolute;
            left: 20px;
            bottom: -15px;
            border-width: 15px 15px 0 0;
            border-style: solid;
            border-color: var(--wood) transparent transparent transparent;
        }
        .btn-coc {
            background: #3b82f6;
            border-bottom: 6px solid #1e3a8a;
            transition: all 0.1s;
        }
        .btn-coc:active { border-bottom-width: 2px; transform: translateY(4px); }
        .loading-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loader" class="loading-overlay">
        <div class="text-white coc-font text-2xl animate-pulse">Cargando Clan...</div>
    </div>

    <div class="max-w-2xl mx-auto">
        <!-- Cabecera -->
        <div class="flex justify-between items-center mb-8">
            <a href="normas.html" class="bg-amber-800 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2">
                <span>⬅</span> VOLVER
            </a>
            <h1 class="coc-font text-3xl text-white uppercase italic">Foro Génesis</h1>
        </div>

        <!-- Formulario -->
        <div class="bg-white/20 p-6 rounded-2xl border-4 border-white/30 mb-8">
            <div class="space-y-4">
                <input type="text" id="userName" placeholder="Tu nombre en CoC..." 
                    class="w-full p-3 rounded-xl border-2 border-amber-900 font-bold focus:outline-none focus:ring-2 focus:ring-blue-500">
                <textarea id="commentText" placeholder="¿Qué piensas sobre las normas?" rows="3"
                    class="w-full p-3 rounded-xl border-2 border-amber-900 font-bold focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                <button id="sendBtn" class="w-full btn-coc text-white coc-font py-3 rounded-xl text-xl uppercase italic">
                    Publicar Comentario
                </button>
            </div>
        </div>

        <!-- Lista de Comentarios -->
        <div id="commentsContainer" class="space-y-6 pb-20">
            <!-- Los comentarios se cargan aquí -->
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración proporcionada por el entorno
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'genesis-coc';

        const loader = document.getElementById('loader');
        const commentsContainer = document.getElementById('commentsContainer');
        const sendBtn = document.getElementById('sendBtn');
        const userNameInput = document.getElementById('userName');
        const commentTextInput = document.getElementById('commentText');

        let currentUser = null;
        let unsubscribeComments = null;

        // Regla 3: Autenticación con prioridad al token personalizado
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Error en la autenticación:", error);
            }
        };

        // Escuchar cambios de estado de autenticación
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                loader.style.display = 'none';
                setupCommentsListener();
            } else {
                // Si no hay usuario, intentamos autenticar
                initAuth();
            }
        });

        // Cargar comentarios con onSnapshot (Reglas 1 y 2)
        function setupCommentsListener() {
            if (!currentUser) return;
            if (unsubscribeComments) unsubscribeComments();

            // Ruta estricta: /artifacts/{appId}/public/data/{collectionName}
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'debate');
            
            // Usamos una consulta simple sin orderBy para evitar necesidad de índices manuales
            unsubscribeComments = onSnapshot(colRef, (snapshot) => {
                const comments = [];
                snapshot.forEach(doc => {
                    comments.push({ id: doc.id, ...doc.data() });
                });

                // Ordenar en memoria por fecha (descendente)
                comments.sort((a, b) => {
                    const timeA = a.createdAt?.seconds || 0;
                    const timeB = b.createdAt?.seconds || 0;
                    return timeB - timeA;
                });

                renderComments(comments);
            }, (err) => {
                console.error("Error al leer comentarios:", err);
            });
        }

        function renderComments(comments) {
            commentsContainer.innerHTML = '';
            if (comments.length === 0) {
                commentsContainer.innerHTML = '<p class="text-white/70 text-center italic">No hay comentarios aún. ¡Sé el primero!</p>';
                return;
            }

            comments.forEach(c => {
                const date = c.createdAt ? new Date(c.createdAt.seconds * 1000).toLocaleDateString() : 'Recién';
                const div = document.createElement('div');
                div.className = 'comment-bubble p-4';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2 border-b border-amber-900/10 pb-1">
                        <span class="font-black text-amber-900 uppercase text-sm italic">${c.author || 'Anónimo'}</span>
                        <span class="text-[10px] text-amber-800/60 font-bold">${date}</span>
                    </div>
                    <p class="text-amber-950 font-medium leading-tight">${c.text || ''}</p>
                `;
                commentsContainer.appendChild(div);
            });
        }

        // Enviar nuevo comentario
        sendBtn.onclick = async () => {
            if (!currentUser) return;

            const author = userNameInput.value.trim();
            const text = commentTextInput.value.trim();

            if (!author || !text) return;

            sendBtn.disabled = true;
            sendBtn.innerText = 'Enviando...';

            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'debate');
                await addDoc(colRef, {
                    author: author,
                    text: text,
                    createdAt: serverTimestamp(),
                    userId: currentUser.uid
                });
                commentTextInput.value = '';
                // Mantener el nombre del autor para el siguiente comentario
            } catch (error) {
                console.error("Error al enviar comentario:", error);
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = 'Publicar Comentario';
            }
        };
    </script>
</body>
</html>
