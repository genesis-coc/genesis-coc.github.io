<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debate de Normas - Génesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Ubuntu:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styleForo.css">
    <link rel="icon" type="image/webp" href="/recursos/img/escudoClanGenesis.webp">
</head>
<body class="p-4 md:p-8">

    <!-- Pantalla de Carga -->
    <div id="loader" class="loading-overlay">
        <div id="loaderContent" class="text-white coc-font text-2xl animate-pulse text-center px-6">
            <p>Cargando Clan...</p>
        </div>
    </div>

    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <a href="index.html" class="bg-amber-800 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2">
                <span>⬅</span> VOLVER
            </a>
            <h1 class="coc-font text-3xl text-white uppercase italic tracking-wider">Foro Génesis</h1>
        </div>

        <!-- Formulario Abierto -->
        <div class="bg-white/20 p-6 rounded-2xl border-4 border-white/30 mb-8 backdrop-blur-sm">
            <div class="space-y-4">
                <input type="text" id="userName" placeholder="Tu nombre en el juego..." 
                    class="w-full p-3 rounded-xl border-2 border-amber-900 font-bold focus:outline-none bg-amber-50">
                <textarea id="commentText" placeholder="Escribe tu mensaje aquí..." rows="3"
                    class="w-full p-3 rounded-xl border-2 border-amber-900 font-bold focus:outline-none bg-amber-50"></textarea>
                <button id="sendBtn" class="w-full btn-coc text-white coc-font py-4 rounded-xl text-xl uppercase italic">
                    Publicar Comentario
                </button>
            </div>
        </div>

        <div id="commentsContainer" class="space-y-6 pb-20"></div>
    </div>

    <script type="module" src="js/foro.js"></script>
</body>
</html>
