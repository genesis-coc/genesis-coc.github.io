<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Génesis</title>

    <link rel="icon" type="image/webp" href="/recursos/img/escudoClanGenesis.webp">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Ubuntu:wght@700&display=swap"
        rel="stylesheet">
    <!-- Enlace a tus estilos externos si los usas -->
    <link rel="stylesheet" href="css/style-admin.css">
</head>

<body>

    <div id="customMsg"></div>

    <!-- PANEL DIRECTO (Acceso libre, seguridad en el botón de envío) -->
    <div id="adminForm" class="coc-panel p-6">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <a href="index.html" title="Volver">
                    <img src="/recursos/img/escudoClanGenesis.webp" alt="Escudo" class="w-12 h-12 object-contain hover:scale-110 transition-transform">
                </a>
                <h1 class="coc-font text-2xl text-amber-900 uppercase italic leading-none">Bitácora de Guerra</h1>
            </div>
            <a href="index.html" class="bg-amber-800 text-white text-[10px] font-bold px-3 py-1 rounded-lg border-b-2 border-black">VOLVER</a>
        </div>

        <div class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-black/5 p-4 rounded-xl">
                <div>
                    <label class="block text-[10px] font-black uppercase mb-1">Categoría</label>
                    <select id="eventType" class="input-coc py-2">
                        <option value="diaria">Guerra Diaria</option>
                        <option value="liga">Liga de Clanes</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase mb-1">Fecha del Evento</label>
                    <input type="text" id="eventDate" placeholder="Ej: 30 Mar 2026" class="input-coc py-2">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-black uppercase mb-1">Nombre del Enfrentamiento</label>
                    <input type="text" id="eventTitle" placeholder="Ej: Génesis vs Enemigo" class="input-coc py-2">
                </div>
            </div>

            <div class="bg-black/5 p-4 rounded-xl">
                <h3 class="coc-font text-lg mb-4 text-amber-900 uppercase italic">Guerreros Afectados</h3>
                <div id="playersList" class="space-y-3 mb-4 max-h-[40vh] overflow-y-auto pr-2"></div>
                <button id="addPlayerBtn" class="btn-add btn-coc py-2 px-4 rounded-lg text-xs font-bold uppercase">+ Añadir Guerrero</button>
            </div>

            <!-- FIRMA OBLIGATORIA PARA PUBLICAR -->
            <div class="bg-amber-900/10 p-4 rounded-xl border-2 border-amber-900/20">
                <label class="block text-[10px] font-black uppercase text-amber-900 mb-2 text-center tracking-widest">Firma de Comandante</label>
                <input type="password" id="masterKey" placeholder="Introduce la llave secreta" class="input-coc text-center border-amber-900/40">
            </div>

            <button id="publishBtn" class="w-full btn-coc coc-font py-4 rounded-xl text-xl uppercase italic tracking-widest">
                Publicar Cambios
            </button>
        </div>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>

</html>
